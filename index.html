<!DOCTYPE html>
<html lang="id">

<head>
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Scan Wajah</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <!-- Pre-fetch models for speed -->
    <link rel="prefetch" href="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/tiny_face_detector_model-weights_manifest.json">
    <link rel="prefetch" href="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/face_landmark_68_model-weights_manifest.json">
    <link rel="prefetch" href="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/face_recognition_model-weights_manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .scan-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
        }

        .scan-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #3b82f6;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
            position: relative;
            transition: border-color 0.3s;
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 80%;
            border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 50% 50% 45% 45%; 
            pointer-events: none;
            z-index: 5;
        }

        .scan-circle.detected {
            border-color: #10b981;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
            top: 50%;
            animation: scan 2s infinite ease-in-out;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 10%;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                top: 90%;
                opacity: 0;
            }
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .status.success {
            color: #10b981;
            font-weight: 600;
        }

        .status.error {
            color: #ef4444;
        }

        .btn {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            background: #3b82f6;
            color: white;
            margin: 0 auto;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:not(:disabled):hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .loading-bar {
            width: 280px;
            height: 4px;
            background: #1e293b;
            border-radius: 4px;
            margin: 12px auto;
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .label {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }

        .sublabel {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-bottom: 20px;
        }

        .fail-box {
            display: none;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #ef4444;
            text-align: center;
            max-width: 280px;
            margin: 10px auto 0;
        }
    </style>
</head>

<body>

    <div class="label" id="title">Scan Wajah</div>
    <div class="sublabel" id="subtitle">Posisikan wajah Anda di tengah lingkaran</div>

    <div class="scan-container">
        <div class="scan-circle" id="circle">
            <video id="cam" autoplay playsinline muted></video>
            <div class="face-guide"></div>
            <div class="scan-line" id="scan-line"></div>
        </div>
    </div>

    <div class="loading-bar">
        <div class="loading-fill" id="load-bar"></div>
    </div>
    <div class="status" id="status">Memuat model AI...</div>

    <button class="btn" id="scan-btn" disabled onclick="doScan()">
        📷 Ambil & Verifikasi Wajah
    </button>

    <div class="fail-box" id="fail-box">
        Wajah tidak terdeteksi atau tidak cocok.<br>Pastikan wajah terlihat jelas dan terang.
    </div>

    <script>
        var faceDescriptorFromParent = null;
        var faceLoaded = false;
        var stream = null;
        var actionType = '';
        var empNik = '';

        // Terima pesan dari Apps Script (parent)
        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || data.type !== 'init') return;

            // Simpan descriptor wajah karyawan dari parent
            faceDescriptorFromParent = data.descriptor ? new Float32Array(data.descriptor) : null;
            actionType = data.actionType || '';
            empNik = data.nik || '';

            document.getElementById('title').textContent = getTitleByType(actionType);
            document.getElementById('subtitle').textContent = 'ID: ' + empNik;
        });

        function getTitleByType(type) {
            var map = {
                masuk: 'Absen Masuk',
                pulang: 'Absen Pulang',
                istirahat_mulai: 'Mulai Istirahat',
                istirahat_selesai: 'Selesai Istirahat'
            };
            return map[type] || 'Scan Wajah';
        }

        // Load Face API models
        function loadModels() {
            var bar = document.getElementById('load-bar');
            var status = document.getElementById('status');
            var progress = 0;
            // Shorter interval for smoother progress
            var interval = setInterval(function () {
                progress = Math.min(progress + 10, 98);
                bar.style.width = progress + '%';
            }, 30);

            Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
                faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
            ]).then(function () {
                clearInterval(interval);
                bar.style.width = '100%';
                faceLoaded = true;
                status.textContent = 'Mencari wajah... Dekatkan wajah ke kamera';
                status.className = 'status success';
                document.getElementById('scan-btn').style.display = 'none'; // Hide button for auto-scan
                
                // Start Auto Scan loop
                startAutoScan();
            }).catch(function (err) {
                clearInterval(interval);
                status.textContent = 'Gagal memuat model AI.';
                status.className = 'status error';
            });
        }

        // Mulai kamera
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false })
                .then(function (s) {
                    stream = s;
                    document.getElementById('cam').srcObject = s;
                    loadModels();
                })
                .catch(function (err) {
                    document.getElementById('status').textContent = 'Gagal akses kamera: ' + err.message;
                    document.getElementById('status').className = 'status error';
                });
        }

        var isProcessingAuto = false;
        var lastTime = 0;
        var scanFreq = 250; // Milliseconds between scans for better balance

        function startAutoScan() {
            function loop(time) {
                if (!faceLoaded) {
                    requestAnimationFrame(loop);
                    return;
                }
                
                if (!isProcessingAuto && (time - lastTime > scanFreq)) {
                    lastTime = time;
                    doScanAuto();
                }
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function doScanAuto() {
            isProcessingAuto = true;
            var video = document.getElementById('cam');
            if (video.paused || video.ended || video.readyState < 2) { 
                isProcessingAuto = false; 
                return; 
            }

            var canvas = document.createElement('canvas');
            var vw = video.videoWidth || 640;
            var vh = video.videoHeight || 480;
            var size = Math.min(vw, vh);
            var sx = (vw - size) / 2;
            var sy = (vh - size) / 2;
            
            // Balanced size for SPEED + QUALITY
            var detectSize = 224; 
            canvas.width = detectSize;
            canvas.height = detectSize;
            canvas.getContext('2d').drawImage(video, sx, sy, size, size, 0, 0, detectSize, detectSize);

            // Tiny Detector with 160px input for better landmark accuracy while remaining fast
            faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 }))
                .withFaceLandmarks()
                .withFaceDescriptor()
                .then(function (detection) {
                    var circle = document.getElementById('circle');
                    var failBox = document.getElementById('fail-box');
                    var statusEl = document.getElementById('status');

                    if (!detection) {
                        if(circle) circle.classList.remove('detected');
                        if(failBox) failBox.style.display = 'none';
                        isProcessingAuto = false;
                        return;
                    }

                    if(circle) circle.classList.add('detected');

                    // 1. Cek apakah admin sudah mendaftarkan wajah karyawan ini
                    if (!faceDescriptorFromParent || faceDescriptorFromParent.length === 0) {
                        if(failBox) {
                            failBox.innerHTML = 'Data wajah belum terdaftar di sistem.<br>Silakan hubungi Admin untuk mendaftar.';
                            failBox.style.display = 'block';
                        }
                        if(statusEl) {
                            statusEl.textContent = 'Gagal: Wajah Belum Terdaftar';
                            statusEl.className = 'status error';
                        }
                        isProcessingAuto = false;
                        return;
                    }

                    // 2. Verifikasi jarak wajah karena descriptor tersedia
                    var dist = faceapi.euclideanDistance(detection.descriptor, faceDescriptorFromParent);
                    // Threshold disesuaikan menjadi 0.50 (karena 0.40 terlalu ketat)
                    if (dist > 0.50) { 
                        if(failBox) {
                            failBox.innerHTML = 'Wajah tidak cocok dengan data karyawan.<br>Jarak: ' + dist.toFixed(3) + ' (Batas Max: 0.50)<br>Harap gunakan ID Anda sendiri.';
                            failBox.style.display = 'block';
                        }
                        if(statusEl) {
                            statusEl.textContent = 'Gagal: Wajah Berbeda (' + dist.toFixed(2) + ')';
                            statusEl.className = 'status error';
                        }
                        isProcessingAuto = false;
                        return;
                    }

                    // Success!
                    if(failBox) failBox.style.display = 'none';
                    if(statusEl) {
                        statusEl.textContent = '✅ Wajah cocok! (Skor: ' + dist.toFixed(3) + ') Memproses...';
                        statusEl.className = 'status success';
                    }
                    
                    // High-speed return
                    var photoDataUrl = canvas.toDataURL('image/jpeg', 0.6); // Use the existing detection canvas to save time

                    var msg = {
                        type: 'face_verified',
                        photo: photoDataUrl,
                        descriptor: Array.from(detection.descriptor)
                    };

                    if (window.opener) {
                        window.opener.postMessage(msg, '*');
                        setTimeout(function () { try { window.close(); } catch(e) {} }, 500);
                    } else {
                        window.parent.postMessage(msg, '*');
                    }
                }).catch(function (err) {
                    isProcessingAuto = false;
                });
        }

        // Start
        function initApp() {
            if(!window.appInitialized) {
                window.appInitialized = true;
                startCamera();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>

</html>
